name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: eight_arms
          POSTGRES_PASSWORD: eight_arms
          POSTGRES_DB: eight_arms_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U eight_arms"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run db:migrate
        env:
          DATABASE_URL: postgres://eight_arms:eight_arms@localhost:5432/eight_arms_test

      - run: pnpm test
        env:
          DATABASE_URL: postgres://eight_arms:eight_arms@localhost:5432/eight_arms_test
          NODE_ENV: test
          ENCRYPTION_KEY: test-encryption-key
